apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: grafana
  namespace: argocd
spec:
  project: default

  source:
    repoURL: oci://ghcr.io/grafana-community/helm-charts
    chart: grafana
    targetRevision: 12.1.0
    helm:
      values: |
        adminUser: admin
        adminPassword: admin

        service:
          type: ClusterIP

        persistence:
          enabled: true
          size: 5Gi

  destination:
    server: https://kubernetes.default.svc
    namespace: grafana

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true