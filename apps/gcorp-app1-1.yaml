apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gcorp-app1-1-app
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/gpasini/gpcorp-infra.git
    targetRevision: main
    path: gcorp-app1-1

  destination:
    server: https://kubernetes.default.svc
    namespace: gcorp-app1-1

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: true
    syncOptions:
      - CreateNamespace=true